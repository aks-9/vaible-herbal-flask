{% extends "base.html" %}

{% block title %}Page Not Found | Vaible Herbal{% endblock %}

{% block content %}
<section class="bg-white dark:bg-gray-950 min-h-[60vh] flex items-center">
  <div class="container-main py-24 text-center max-w-xl mx-auto">

    <p class="text-8xl font-bold text-brand-600 dark:text-brand-400 mb-4 font-serif">404</p>
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-3">Page Not Found</h1>
    <p class="text-gray-500 dark:text-gray-400 mb-8 leading-relaxed">
      The page you're looking for doesn't exist or may have been moved.<br />
      Try browsing our products or get in touch with us.
    </p>

    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="{{ url_for('index') }}" class="btn-primary">Go to Homepage</a>
      <a href="{{ url_for('products') }}"
         class="btn-ghost border border-brand-600 text-brand-700 dark:text-brand-400 dark:border-brand-500
                hover:bg-brand-50 dark:hover:bg-brand-950">
        Browse Products
      </a>
    </div>

  </div>
</section>
{% endblock %}
